<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Baratinha versions timeline placeholder</title>
  <desc id="desc">Placeholder for multiple versions of the robot.</desc>
  <rect width="1600" height="900" fill="#0f172a"/>
  <line x1="180" y1="470" x2="1420" y2="470" stroke="#93c5fd" stroke-width="10"/>
  <g fill="#1e3a8a" stroke="#bfdbfe" stroke-width="8">
    <circle cx="260" cy="470" r="80"/>
    <circle cx="560" cy="470" r="80"/>
    <circle cx="860" cy="470" r="80"/>
    <circle cx="1160" cy="470" r="80"/>
    <circle cx="1360" cy="470" r="80"/>
  </g>
  <g fill="#e2e8f0" font-family="Arial, sans-serif" font-size="32" text-anchor="middle">
    <text x="260" y="490">V1</text>
    <text x="560" y="490">V3</text>
    <text x="860" y="490">V5</text>
    <text x="1160" y="490">V7</text>
    <text x="1360" y="490">NEXT</text>
  </g>
  <text x="180" y="220" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="70" font-weight="700">VERSIONS TIMELINE</text>
  <text x="180" y="300" fill="#93c5fd" font-family="Arial, sans-serif" font-size="34">Use photos of multiple PCB or robot generations here.</text>
</svg>
