        summary: Robô médico autônomo orientado a ambientes hospitalares.
        highlights:
          - Navegação autônoma com ROS e C++.
          - Integração de sensores complexos e tomada de decisão em tempo real.
      - name: Robô Baratinha
        summary: Plataforma modular de P&D para ensino e pesquisa em robótica e sistemas embarcados.
        highlights:
          - 7+ versões de PCB com arquitetura evolutiva.
          - Publicação internacional na Springer Nature com DOI 10.1007/978-3-031-98762-5_44.
      - name: Projeto Refrative
        summary: Solução IoT com prototipagem física e interface web embarcada.
        highlights:
          - Modelagem 3D e fabricação com K1 Max.
          - Controle local com HTML, CSS e JavaScript.
      - name: Elmo 2.0
        summary: Firmware crítico para dispositivo de suporte respiratório.
        highlights:
          - Segurança funcional, tolerância a falhas e registro no INPI.

