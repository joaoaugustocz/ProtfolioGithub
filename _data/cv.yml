        area: Engenharia da Computação
        studyType: Bacharelado
        start_date: 2022-01-01
        end_date: 2025-12-01
        highlights:
          - Graduação concluída com foco em sistemas embarcados, software aplicado e robótica.

      - institution: Instituto Federal do Ceará (IFCE)
        location: Fortaleza, CE
        area: Engenharia Mecatrônica
        studyType: Bacharelado
        start_date: 2022-08-01
        highlights:
          - Formação em andamento com ênfase em automação, eletrônica e integração eletromecânica.

    Experiência:
      - company: Projeto CriarCE
        position: Embedded Engineer
        location: Fortaleza, CE
        start_date: 2024-10-01
        summary: Python, IoT e arquiteturas de borda para MVPs e prototipagem acelerada.
        highlights:
          - Liderança técnica no desenvolvimento de 10+ MVPs anuais com integração de 40+ sensores e atuadores.
          - Implementação de conectividade MQTT/HTTP, telemetria e aplicações de IA embarcada em soluções de inovação.
          - Produção de 60+ documentações técnicas entre arquitetura, requisitos, relatórios e rastreabilidade.
          - Gestão do versionamento e organização de múltiplos projetos simultâneos com Git.

      - company: Centro de Robótica Farias Brito
        position: Mentor Líder de Robótica e P&D
        location: Fortaleza, CE
        start_date: 2019-01-01
        summary: Mentoria técnica, robótica competitiva e formação de equipes de alto desempenho.
        highlights:
          - Liderança e mentoria de 80+ estudantes distribuídos em 20+ equipes de robótica autônoma.
          - Ensino aplicado de Python, C++, visão computacional, LiDAR e fusão de sensores em ambientes dinâmicos.
          - Gestão de quatro equipes de alto rendimento com formação de três equipes campeãs latino-americanas.

      - company: Universidade de Fortaleza (UNIFOR)
        position: Engenheiro de Software Embarcado
        location: Fortaleza, CE
        start_date: 2022-08-01
        end_date: 2023-06-01
        summary: Projeto Elmo 2.0 na área de healthcare e suporte respiratório.
        highlights:
          - Desenvolvimento de firmware crítico com foco em tolerância a falhas, segurança do paciente e validação funcional.
          - Integração de sensores médicos de precisão e rotinas de aquisição de dados sob testes de bancada.
          - Coautoria no registro INPI BR 51 2023 004110 6 para software de cálculo de volume tidal em sistema respiratório fechado.

