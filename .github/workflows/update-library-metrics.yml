name: Update Library Metrics

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-library-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Save current library_metrics.yml hash
        id: before
        run: |
          if [ -f _data/library_metrics.yml ]; then
            sha_before=$(sha256sum _data/library_metrics.yml | awk '{print $1}')
            echo "sha_before=$sha_before" >> $GITHUB_OUTPUT
          else
            echo "sha_before=none" >> $GITHUB_OUTPUT
          fi

      - name: Update library metrics snapshot
        env:
          GH_TRAFFIC_TOKEN: ${{ secrets.GH_TRAFFIC_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python bin/update_library_metrics.py

      - name: Save new library_metrics.yml hash
        id: after
        run: |
          sha_after=$(sha256sum _data/library_metrics.yml | awk '{print $1}')
          echo "sha_after=$sha_after" >> $GITHUB_OUTPUT

      - name: Configure Git
        if: steps.before.outputs.sha_before != steps.after.outputs.sha_after
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: Commit library metrics snapshot
        if: steps.before.outputs.sha_before != steps.after.outputs.sha_after
        run: |
          git add _data/library_metrics.yml
          git commit -m "Update library metrics"
          git push

      - name: Setup Ruby
        if: steps.before.outputs.sha_before != steps.after.outputs.sha_after
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Build site
        if: steps.before.outputs.sha_before != steps.after.outputs.sha_after
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade nbconvert
          export JEKYLL_ENV=production
          bundle exec jekyll build

      - name: Purge unused CSS
        if: steps.before.outputs.sha_before != steps.after.outputs.sha_after
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js

      - name: Deploy updated site
        if: steps.before.outputs.sha_before != steps.after.outputs.sha_after
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
